name: D

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # node24
      - name: Install verified LDC 1.42.0
        shell: sh
        run: scripts/install-ldc.sh
      - name: Build and test
        shell: sh
        run: |
          dub test --compiler=ldc2
          dub build --build=release --compiler=ldc2
          ldc2 tests/test.d -of=/tmp/adfmt-regression-tests
          cd tests
          /tmp/adfmt-regression-tests
          cd ..
          ADFMT_BIN="$PWD/bin/adfmt" tests/cli.sh
      - name: Check patch hygiene
        shell: sh
        run: git diff --check
