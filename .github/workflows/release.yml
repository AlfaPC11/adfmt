name: Release

on:
  push:
    tags:
      - "adfmt-v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Existing adfmt release version to rebuild (for example, 0.4.0)"
        required: true
        type: string

env:
  ADFMT_RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && format('adfmt-v{0}', inputs.version) || github.ref_name }}

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # node24
        with:
          ref: ${{ env.ADFMT_RELEASE_TAG }}
      - name: Install verified LDC 1.42.0
        shell: sh
        run: scripts/install-ldc.sh
      - name: Verify release metadata
        shell: sh
        run: |
          VERSION=${ADFMT_RELEASE_TAG#adfmt-v}
          test "$ADFMT_RELEASE_TAG" = "adfmt-v$VERSION"
          test "$(sed -n 's/^pkgver=//p' packaging/arch/PKGBUILD)" = "$VERSION"
          test "$(tr -d '\r\n' < VERSION)" = "$VERSION"
          test "$(sed -n 's/^version: //p' packaging/nfpm.yaml)" = '${ADFMT_VERSION}'
      - name: Run all checks
        shell: sh
        run: |
          dub test --compiler=ldc2
          dub build --build=release --compiler=ldc2
          ldc2 tests/test.d -of=/tmp/adfmt-regression-tests
          cd tests
          /tmp/adfmt-regression-tests
          cd ..
          ADFMT_BIN="$PWD/bin/adfmt" tests/cli.sh

  linux-packages:
    needs: verify
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # node24
        with:
          ref: ${{ env.ADFMT_RELEASE_TAG }}
      - name: Install verified LDC 1.42.0
        shell: sh
        run: scripts/install-ldc.sh
      - name: Build adfmt
        shell: sh
        run: dub build --build=release --compiler=ldc2
      - name: Install verified nFPM
        shell: sh
        env:
          NFPM_VERSION: "2.46.3"
          NFPM_SHA256: "9170d25ea056d7329def38134b2bcad98d02d221f8331610dcd619e84d28c565"
        run: |
          ARCHIVE="$RUNNER_TEMP/nfpm.tar.gz"
          curl --fail --location --silent --show-error \
            --output "$ARCHIVE" \
            "https://github.com/goreleaser/nfpm/releases/download/v${NFPM_VERSION}/nfpm_${NFPM_VERSION}_Linux_x86_64.tar.gz"
          printf '%s  %s\n' "$NFPM_SHA256" "$ARCHIVE" | sha256sum --check --strict
          mkdir -p "$RUNNER_TEMP/nfpm"
          tar --extract --gzip --directory="$RUNNER_TEMP/nfpm" \
            --file="$ARCHIVE" nfpm
          printf '%s\n' "$RUNNER_TEMP/nfpm" >> "$GITHUB_PATH"
      - name: Build deb and rpm packages
        shell: sh
        run: |
          VERSION=${ADFMT_RELEASE_TAG#adfmt-v}
          mkdir -p dist
          ADFMT_VERSION="$VERSION" nfpm package \
            --config packaging/nfpm.yaml \
            --packager deb \
            --target "dist/adfmt_${VERSION}_amd64.deb"
          ADFMT_VERSION="$VERSION" nfpm package \
            --config packaging/nfpm.yaml \
            --packager rpm \
            --target "dist/adfmt-${VERSION}-1.x86_64.rpm"
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # node24
        with:
          name: linux-packages
          path: dist/*
          if-no-files-found: error

  arch-package:
    needs: verify
    runs-on: ubuntu-24.04
    container: archlinux:base-devel@sha256:0cf5eb78f8c3ddcdd7ccc3f9168328fb57ec6be0f83f501a0b2006590e0c92ec
    steps:
      - name: Install build tools
        shell: sh
        run: pacman -Syu --noconfirm git dub ldc sudo
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # node24
        with:
          ref: ${{ env.ADFMT_RELEASE_TAG }}
      - name: Build source and Arch Linux packages
        shell: sh
        run: |
          VERSION=${ADFMT_RELEASE_TAG#adfmt-v}
          SOURCE_CACHE="adfmt-$VERSION.tar.gz"
          SOURCE_ASSET="adfmt-$VERSION-source.tar.gz"
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          chmod +x scripts/create-source-archive.sh tests/cli.sh
          scripts/create-source-archive.sh "$VERSION" "packaging/arch/$SOURCE_CACHE"
          EXPECTED=$(sed -n "s/^sha256sums=('\([^']*\)').*/\1/p" packaging/arch/PKGBUILD)
          printf '%s  %s\n' "$EXPECTED" "packaging/arch/$SOURCE_CACHE" | sha256sum --check --strict
          useradd --create-home builder
          printf 'builder ALL=(ALL) NOPASSWD: ALL\n' > /etc/sudoers.d/builder
          chown -R builder:builder "$GITHUB_WORKSPACE"
          sudo -u builder sh -c \
            "cd '$GITHUB_WORKSPACE/packaging/arch' && makepkg --syncdeps --noconfirm --cleanbuild"
          mkdir -p dist
          cp packaging/arch/*.pkg.tar.zst dist/
          cp "packaging/arch/$SOURCE_CACHE" "dist/$SOURCE_ASSET"
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # node24
        with:
          name: arch-package
          path: dist/*
          if-no-files-found: error

  windows-installer:
    needs: verify
    runs-on: windows-2025
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # node24
        with:
          ref: ${{ env.ADFMT_RELEASE_TAG }}
      - name: Install verified LDC 1.42.0
        shell: pwsh
        run: |
          $version = "1.42.0"
          $archive = "ldc2-$version-windows-x64.7z"
          $archivePath = Join-Path $env:RUNNER_TEMP $archive
          Invoke-WebRequest `
            -Uri "https://github.com/ldc-developers/ldc/releases/download/v$version/$archive" `
            -OutFile $archivePath
          $actual = (Get-FileHash -Algorithm SHA256 $archivePath).Hash.ToLowerInvariant()
          if ($actual -ne "5b16bf2a44d7fb6b8012f932c8760603dab6307968c3112cc578b5690f46b5c8") {
            throw "LDC SHA256 mismatch: $actual"
          }
          7z x $archivePath "-o$env:RUNNER_TEMP" -y | Out-Null
          Add-Content $env:GITHUB_PATH "$env:RUNNER_TEMP\ldc2-$version-windows-x64\bin"
      - name: Build adfmt.exe
        run: dub build --build=release --compiler=ldc2
      - name: Install pinned Inno Setup
        run: choco install innosetup --version=6.3.2 --allow-downgrade --no-progress --yes
      - name: Build installer
        shell: pwsh
        run: |
          $version = "${env:ADFMT_RELEASE_TAG}".Substring("adfmt-v".Length)
          $env:ADFMT_VERSION = $version
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Copy-Item bin/adfmt.exe "dist/adfmt-$version-windows-x86_64.exe"
          & "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe" `
            "packaging/windows/adfmt.iss"
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # node24
        with:
          name: windows-packages
          path: dist/*
          if-no-files-found: error

  publish:
    needs: [linux-packages, arch-package, windows-installer]
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@484a0b528fb4d7bd804637ccb632e47a0e638317 # node24
        with:
          path: dist
          merge-multiple: true
      - name: Create checksums
        working-directory: dist
        shell: sh
        run: sha256sum * > SHA256SUMS
      - name: Publish GitHub Release
        shell: sh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION=${ADFMT_RELEASE_TAG#adfmt-v}
          gh release create "$ADFMT_RELEASE_TAG" dist/* \
            --repo "$GITHUB_REPOSITORY" \
            --title "adfmt $VERSION" \
            --generate-notes \
            --verify-tag
