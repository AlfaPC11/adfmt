name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dlang-community/setup-dlang@v2
        with:
          compiler: ldc
      - name: Run unit tests
        run: dub test --compiler=ldc2
      - name: Run formatter regression tests
        run: |
          dub build --build=release --compiler=ldc2
          ldc2 tests/test.d -of=/tmp/adfmt-regression-tests
          cd tests
          /tmp/adfmt-regression-tests

  linux-packages:
    needs: verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dlang-community/setup-dlang@v2
        with:
          compiler: ldc
      - name: Build adfmt
        run: dub build --build=release --compiler=ldc2
      - name: Install nFPM
        env:
          NFPM_VERSION: "2.46.3"
        run: |
          curl --fail --location --silent --show-error \
            "https://github.com/goreleaser/nfpm/releases/download/v${NFPM_VERSION}/nfpm_${NFPM_VERSION}_Linux_x86_64.tar.gz" \
            | sudo tar --extract --gzip --directory=/usr/local/bin nfpm
      - name: Build deb and rpm packages
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          mkdir -p dist
          ADFMT_VERSION="$VERSION" nfpm package \
            --config packaging/nfpm.yaml \
            --packager deb \
            --target "dist/adfmt_${VERSION}_amd64.deb"
          ADFMT_VERSION="$VERSION" nfpm package \
            --config packaging/nfpm.yaml \
            --packager rpm \
            --target "dist/adfmt-${VERSION}-1.x86_64.rpm"
      - uses: actions/upload-artifact@v4
        with:
          name: linux-packages
          path: dist/*
          if-no-files-found: error

  arch-package:
    needs: verify
    runs-on: ubuntu-latest
    container: archlinux:base-devel
    steps:
      - name: Install build tools
        run: pacman -Syu --noconfirm git dub ldc sudo
      - uses: actions/checkout@v4
      - name: Build Arch Linux package
        run: |
          useradd --create-home builder
          printf 'builder ALL=(ALL) NOPASSWD: ALL\n' > /etc/sudoers.d/builder
          chown -R builder:builder "$GITHUB_WORKSPACE"
          sudo -u builder bash -lc \
            "cd '$GITHUB_WORKSPACE/packaging/arch' && makepkg --syncdeps --noconfirm --cleanbuild"
          mkdir -p dist
          cp packaging/arch/*.pkg.tar.zst dist/
      - uses: actions/upload-artifact@v4
        with:
          name: arch-package
          path: dist/*
          if-no-files-found: error

  windows-installer:
    needs: verify
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dlang-community/setup-dlang@v2
        with:
          compiler: ldc
      - name: Build adfmt.exe
        run: dub build --build=release --compiler=ldc2
      - name: Install Inno Setup
        run: choco install innosetup --no-progress --yes
      - name: Build installer
        shell: pwsh
        run: |
          $version = "${env:GITHUB_REF_NAME}".TrimStart("v")
          $env:ADFMT_VERSION = $version
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Copy-Item bin/adfmt.exe "dist/adfmt-$version-windows-x86_64.exe"
          & "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe" `
            "packaging/windows/adfmt.iss"
      - uses: actions/upload-artifact@v4
        with:
          name: windows-packages
          path: dist/*
          if-no-files-found: error

  publish:
    needs:
      - linux-packages
      - arch-package
      - windows-installer
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: Create checksums
        working-directory: dist
        run: sha256sum * > SHA256SUMS
      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" dist/* \
            --repo "$GITHUB_REPOSITORY" \
            --title "adfmt ${GITHUB_REF_NAME#v}" \
            --generate-notes \
            --verify-tag
