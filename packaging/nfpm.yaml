# yaml-language-server: $schema=https://nfpm.goreleaser.com/schema.json
# SPDX-License-Identifier: BSL-1.0

name: adfmt
arch: amd64
platform: linux
version: ${ADFMT_VERSION}
release: "1"
section: devel
priority: optional
maintainer: Alfa <AlfaPC11@users.noreply.github.com>
description: |
  Alfa's D Formatter is a dfmt fork with extensionless YAML configuration
  and independent brace styles for declarations and control-flow statements.
vendor: Alfa
homepage: https://github.com/AlfaPC11/adfmt
license: BSL-1.0

contents:
  - src: ./bin/adfmt
    dst: /usr/bin/adfmt
    file_info:
      mode: 0755
  - src: ./LICENSE.txt
    dst: /usr/share/licenses/adfmt/LICENSE
  - src: ./PATENTS
    dst: /usr/share/licenses/adfmt/PATENTS
  - src: ./NOTICE
    dst: /usr/share/licenses/adfmt/NOTICE
  - src: ./README.md
    dst: /usr/share/doc/adfmt/README.md
  - src: ./docs
    dst: /usr/share/doc/adfmt/docs
    type: tree
  - src: ./examples
    dst: /usr/share/doc/adfmt/examples
    type: tree
  - src: ./bash-completion/completions/adfmt
    dst: /usr/share/bash-completion/completions/adfmt

overrides:
  deb:
    depends:
      - libc6
      - libgcc-s1
  rpm:
    depends:
      - glibc
      - libgcc
